name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npx vitest run --reporter=default --reporter=json --outputFile=/tmp/server-results.json
        working-directory: server

      - name: Run client tests
        run: npx vitest run --reporter=default --reporter=json --outputFile=/tmp/client-results.json
        working-directory: client

      - name: Compute test totals
        id: counts
        run: |
          node - <<'EOF'
          const fs = require('fs');
          function tally(path) {
            try {
              const r = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (typeof r.numTotalTests === 'number') {
                return { total: r.numTotalTests, passed: r.numPassedTests };
              }
              let total = 0, passed = 0;
              for (const suite of (r.testResults || [])) {
                for (const t of (suite.assertionResults || [])) {
                  total++;
                  if (t.status === 'passed') passed++;
                }
              }
              return { total, passed };
            } catch (e) { return { total: 0, passed: 0 }; }
          }
          const s = tally('/tmp/server-results.json');
          const c = tally('/tmp/client-results.json');
          const total  = s.total  + c.total;
          const passed = s.passed + c.passed;
          const label  = passed + '/' + total + ' passing';
          const color  = passed === total ? 'brightgreen' : 'red';
          const out = 'label=' + label + '\ncolor=' + color + '\n';
          fs.appendFileSync(process.env.GITHUB_OUTPUT, out);
          console.log('Tests: ' + label);
          EOF

      - name: Update test badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ secrets.GIST_ID }}
          filename: anima-tests.json
          label: tests
          message: ${{ steps.counts.outputs.label }}
          color: ${{ steps.counts.outputs.color }}
