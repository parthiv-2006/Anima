name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-server:
    name: Server Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run server unit & integration tests
        run: npm run test:server
        env:
          JWT_SECRET: ci-test-secret-not-for-prod

  test-client:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run client unit tests
        run: npm run test:client

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-server, test-client]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build client
        run: npm run build

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGODB_URI: mongodb://localhost:27017/anima-e2e
      JWT_SECRET: ci-test-secret-not-for-prod
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      NODE_ENV: development
      PORT: 5000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start backend server
        run: npm run dev:server &
        env:
          MONGODB_URI: mongodb://localhost:27017/anima-e2e
          JWT_SECRET: ci-test-secret-not-for-prod
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:5000/health; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend... ($i)"
            sleep 2
          done
      - name: Run E2E tests
        run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
